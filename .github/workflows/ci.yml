name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,full]"

      - name: Ruff lint
        run: ruff check shadow_code/ tests/

      - name: Ruff format
        run: ruff format --check shadow_code/ tests/

      - name: Mypy type check
        run: mypy shadow_code/ --ignore-missing-imports --disable-error-code=import-untyped

      - name: Bandit security scan
        run: bandit -r shadow_code/ -c pyproject.toml -q

      - name: Tests with coverage
        run: |
          pytest tests/ --cov=shadow_code --cov-report=term-missing --cov-fail-under=80 -q

      - name: Check for secrets
        run: |
          ! grep -rn "sk-\|api_key\s*=\s*['\"]" shadow_code/ --include="*.py" | grep -v "\.pyc"
